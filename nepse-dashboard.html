<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPSE Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2430;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --red: #ff4757;
    --green: #00d4aa;
    --yellow: #ffd32a;
    --text: #e8eaf0;
    --muted: #5a6070;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* === HEADER === */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .logo-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--bg);
    font-size: 14px; font-weight: 700;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .market-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    border: 1px solid;
    transition: all 0.3s;
  }

  .market-badge.open {
    color: var(--green);
    border-color: rgba(0,212,170,0.3);
    background: rgba(0,212,170,0.08);
  }

  .market-badge.close {
    color: var(--muted);
    border-color: rgba(90,96,112,0.3);
    background: rgba(90,96,112,0.08);
  }

  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .as-of {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* === MAIN LAYOUT === */
  main {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px;
  }

  /* === STAT CARDS === */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.green::after { background: var(--green); }
  .stat-card.blue::after { background: var(--accent2); }
  .stat-card.yellow::after { background: var(--yellow); }
  .stat-card.red::after { background: var(--red); }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* === PANEL === */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .panel-header {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }

  .panel-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* === SEARCH + FILTERS === */
  .search-bar {
    position: relative;
    flex: 1;
    max-width: 300px;
  }

  .search-bar input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px 7px 32px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  .search-bar svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  .sort-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .sort-btn:hover, .sort-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* === TABLE === */
  .table-wrapper {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    padding: 10px 16px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--accent); }

  thead th.sorted { color: var(--accent); }

  thead th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    opacity: 0.5;
  }

  thead th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid rgba(30,36,48,0.6);
    transition: background 0.12s;
    cursor: pointer;
  }

  tbody tr:hover { background: rgba(255,255,255,0.025); }

  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 11px 16px;
    white-space: nowrap;
  }

  .symbol-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .symbol-icon {
    width: 30px; height: 30px;
    border-radius: 7px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    color: var(--accent);
    border: 1px solid var(--border);
    flex-shrink: 0;
    letter-spacing: 0;
  }

  .symbol-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }

  .security-full {
    font-size: 11px;
    color: var(--muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .price-cell {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .change-cell {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    display: inline-block;
  }

  .change-cell.pos {
    color: var(--green);
    background: rgba(0,212,170,0.1);
  }

  .change-cell.neg {
    color: var(--red);
    background: rgba(255,71,87,0.1);
  }

  .change-cell.flat {
    color: var(--muted);
    background: rgba(90,96,112,0.1);
  }

  .vol-cell {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .range-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 120px;
  }

  .range-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    width: 45px;
  }

  .range-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    position: relative;
  }

  .range-fill {
    position: absolute;
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  /* 52W bar */
  .week52 {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 140px;
  }

  .week52-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    position: relative;
  }

  .week52-dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--yellow);
    top: -1px;
    transform: translateX(-50%);
  }

  .week52-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
  }

  /* === PAGINATION === */
  .pagination {
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .page-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .page-btns {
    display: flex;
    gap: 6px;
  }

  .page-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .page-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .page-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* === MODAL === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 560px;
    overflow: hidden;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: var(--surface2);
  }

  .modal-symbol {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .modal-name {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    max-width: 360px;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .modal-close:hover { color: var(--text); background: var(--border); }

  .modal-body {
    padding: 24px;
  }

  .modal-price-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
  }

  .modal-price {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
  }

  .modal-change {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 7px;
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .modal-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .modal-item-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }

  .modal-item-value {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .modal-52w {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .modal-52w-title {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  .modal-52w-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    position: relative;
    margin: 8px 0;
  }

  .modal-52w-dot {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--yellow);
    top: -2px;
    transform: translateX(-50%);
    box-shadow: 0 0 8px var(--yellow);
  }

  .modal-52w-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  /* === LOADING === */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* === TABS === */
  .tab-bar {
    display: flex;
    gap: 4px;
    padding: 14px 22px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 6px 16px;
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    border: 1px solid transparent;
    text-transform: uppercase;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* === ERROR STATE === */
  .error-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .error-state .err-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .error-state h3 {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .error-state p {
    font-size: 12px;
    max-width: 400px;
    margin: 0 auto 16px;
    line-height: 1.6;
  }

  .error-state .hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 8px 14px;
    border-radius: 7px;
    display: inline-block;
    border: 1px solid var(--border);
  }

  /* === RESPONSIVE === */
  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    main { padding: 16px; }
    .security-full, .week52, .range-bar { display: none; }
  }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    header { padding: 0 16px; }
    .as-of { display: none; }
    .modal-grid { grid-template-columns: 1fr; }
    .modal-price { font-size: 28px; }
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">FETCHING MARKET DATA...</div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">N</div>
    NEPSE
  </div>
  <div class="header-right">
    <div class="market-badge close" id="marketBadge">
      <div class="pulse"></div>
      <span id="marketStatus">CHECKING...</span>
    </div>
    <div class="as-of" id="asOf">—</div>
    <button class="refresh-btn" onclick="refreshAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Refresh
    </button>
  </div>
</header>

<!-- Main -->
<main>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card green">
      <div class="stat-label">Total Securities</div>
      <div class="stat-value" id="totalSecurities">—</div>
      <div class="stat-sub">Listed today</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Gainers</div>
      <div class="stat-value" id="totalGainers">—</div>
      <div class="stat-sub" id="gainersRatio">vs losers</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Losers</div>
      <div class="stat-value" id="totalLosers">—</div>
      <div class="stat-sub">Down today</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-label">Top Volume</div>
      <div class="stat-value" id="topVolSymbol">—</div>
      <div class="stat-sub" id="topVolVal">—</div>
    </div>
  </div>

  <!-- Table Panel -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">TODAY'S PRICES</div>
      <div class="panel-actions">
        <div class="search-bar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search symbol..." oninput="filterTable()">
        </div>
        <button class="sort-btn" onclick="sortBy('change_desc')" id="btn_change_desc">▼ Change %</button>
        <button class="sort-btn" onclick="sortBy('volume_desc')" id="btn_volume_desc">▼ Volume</button>
        <button class="sort-btn" onclick="sortBy('price_desc')" id="btn_price_desc">▼ Price</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('today', this)">Today's Price</div>
      <div class="tab" onclick="switchTab('trade', this)">Trade Stats</div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table id="mainTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">

      <div class="page-btns" id="pageBtns"></div>
    </div>

</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-symbol" id="mSymbol">—</div>
        <div class="modal-name" id="mName">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-price-row">
        <div class="modal-price" id="mPrice">—</div>
        <div class="modal-change" id="mChange">—</div>
      </div>
      <div class="modal-grid" id="mGrid"></div>
      <div class="modal-52w" id="m52w" style="display:none">
        <div class="modal-52w-title">52-Week Range</div>
        <div class="modal-52w-labels" id="m52wLabels"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG & STATE
// ============================================================
const API_BASE = 'https://www.nepalstock.com/api/nots';
const PROXY = 'https://api.allorigins.win/raw?url=';

let allData = [];        // raw data from current tab
let filteredData = [];   // after search/sort
let currentTab = 'today';
let currentSort = null;
let currentPage = 1;
const PAGE_SIZE = 25;

// ============================================================
// UTILS
// ============================================================
const fmt = n => n == null ? '—' : Number(n).toLocaleString('en-IN', { maximumFractionDigits: 2 });
const fmtPrice = n => n == null ? '—' : 'NPR ' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtVol = n => {
  if (n == null) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function fetchWithProxy(url) {
  // Try direct first (works if CORS allowed), then proxy
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (r.ok) return r.json();
  } catch {}
  const r2 = await fetch(PROXY + encodeURIComponent(url));
  if (!r2.ok) throw new Error('Failed: ' + url);
  return r2.json();
}

// ============================================================
// MARKET STATUS
// ============================================================
async function fetchMarketStatus() {
  try {
    const data = await fetchWithProxy(`${API_BASE}/nepse-data/market-open`);
    const badge = document.getElementById('marketBadge');
    const status = document.getElementById('marketStatus');
    const asOf = document.getElementById('asOf');

    const isOpen = data.isOpen === 'OPEN';
    badge.className = 'market-badge ' + (isOpen ? 'open' : 'close');
    status.textContent = data.isOpen || '—';

    if (data.asOf) {
      const d = new Date(data.asOf);
      asOf.textContent = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
  } catch (e) {
    document.getElementById('marketStatus').textContent = 'UNKNOWN';
    console.warn('Market status error:', e);
  }
}

// ============================================================
// TODAY'S PRICE
// ============================================================
async function fetchTodaysPrice() {
  // Paginated API — fetch all pages
  let allItems = [];
  let page = 0;
  let totalPages = 1;

  // Try to get page 0 first with id payload (as seen in the XHR)
  try {
    const url = `${API_BASE}/nepse-data/today-price?`;
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: 502946 })
    });
    if (response.ok) {
      const data = await response.json();
      allItems = allItems.concat(data.content || []);
      totalPages = data.totalPages || 1;

      // Fetch remaining pages
      const fetches = [];
      for (let p = 1; p < totalPages; p++) {
        fetches.push(
          fetch(`${url}&page=${p}&size=50`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: 502946 })
          }).then(r => r.json()).then(d => d.content || []).catch(() => [])
        );
      }
      const results = await Promise.all(fetches);
      results.forEach(r => { allItems = allItems.concat(r); });
      return allItems;
    }
  } catch {}

  // Fallback: proxy
  try {
    const url = `${API_BASE}/nepse-data/today-price?`;
    const data = await fetchWithProxy(url);
    return data.content || [];
  } catch (e) {
    throw new Error('Could not fetch today\'s price data.');
  }
}

// ============================================================
// DAILY TRADE STATS
// ============================================================
async function fetchTradeStats() {
  // Index 58 = main market (from your example)
  const url = `${API_BASE}/securityDailyTradeStat/58`;
  try {
    const r = await fetch(url);
    if (r.ok) return r.json();
  } catch {}
  return fetchWithProxy(url);
}

// ============================================================
// RENDER TABLE
// ============================================================
function renderTodayTable(data) {
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');

  head.innerHTML = `<tr>
    <th onclick="sortCol('symbol')" class="sorted" id="th_symbol">Symbol <span class="sort-arrow">↕</span></th>
    <th onclick="sortCol('closePrice_desc')">Price <span class="sort-arrow">↕</span></th>
    <th onclick="sortCol('pct')">Change <span class="sort-arrow">↕</span></th>
    <th onclick="sortCol('totalTradedQuantity_desc')">Volume <span class="sort-arrow">↕</span></th>
    <th>Open</th>
    <th>High</th>
    <th>Low</th>
    <th onclick="sortCol('totalTrades_desc')">Trades <span class="sort-arrow">↕</span></th>
    <th class="week52">52W Range</th>
  </tr>`;

  body.innerHTML = '';
  if (!data.length) {
    body.innerHTML = `<tr><td colspan="9"><div class="error-state"><div class="err-icon">📭</div><h3>No Data Found</h3><p>No securities match your search.</p></div></td></tr>`;
    return;
  }

  data.forEach(row => {
    const pct = ((row.closePrice - row.previousDayClosePrice) / row.previousDayClosePrice * 100);
    const cls = pct > 0 ? 'pos' : pct < 0 ? 'neg' : 'flat';
    const pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';

    let w52 = '';
    if (row.fiftyTwoWeekHigh && row.fiftyTwoWeekLow) {
      const range = row.fiftyTwoWeekHigh - row.fiftyTwoWeekLow;
      const pos = range > 0 ? Math.max(0, Math.min(100, ((row.closePrice - row.fiftyTwoWeekLow) / range) * 100)) : 50;
      w52 = `<div class="week52">
        <div class="week52-bar">
          <div class="week52-dot" style="left:${pos}%"></div>
        </div>
        <div class="week52-labels">
          <span>${fmt(row.fiftyTwoWeekLow)}</span>
          <span>${fmt(row.fiftyTwoWeekHigh)}</span>
        </div>
      </div>`;
    }

    const tr = document.createElement('tr');
    tr.onclick = () => openModal(row, currentTab);
    tr.innerHTML = `
      <td>
        <div class="symbol-cell">
          <div class="symbol-icon">${(row.symbol||'').slice(0,4)}</div>
          <div>
            <div class="symbol-name">${row.symbol || '—'}</div>
            <div class="security-full">${row.securityName || ''}</div>
          </div>
        </div>
      </td>
      <td class="price-cell">${fmt(row.closePrice)}</td>
      <td><span class="change-cell ${cls}">${pctStr}</span></td>
      <td class="vol-cell">${fmtVol(row.totalTradedQuantity)}</td>
      <td class="vol-cell">${fmt(row.openPrice)}</td>
      <td class="vol-cell" style="color:var(--green)">${fmt(row.highPrice)}</td>
      <td class="vol-cell" style="color:var(--red)">${fmt(row.lowPrice)}</td>
      <td class="vol-cell">${fmt(row.totalTrades)}</td>
      <td class="week52">${w52}</td>
    `;
    body.appendChild(tr);
  });
}

function renderTradeTable(data) {
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');

  head.innerHTML = `<tr>
    <th onclick="sortCol('symbol')">Symbol <span class="sort-arrow">↕</span></th>
    <th onclick="sortCol('closePrice_desc')">Close Price <span class="sort-arrow">↕</span></th>
    <th onclick="sortCol('pct')">Change % <span class="sort-arrow">↕</span></th>
    <th onclick="sortCol('totalTradeQuantity_desc')">Volume <span class="sort-arrow">↕</span></th>
    <th>Prev Close</th>
  </tr>`;

  body.innerHTML = '';
  if (!data.length) {
    body.innerHTML = `<tr><td colspan="5"><div class="error-state"><div class="err-icon">📭</div><h3>No Data Found</h3></div></td></tr>`;
    return;
  }

  data.forEach(row => {
    const pct = row.percentageChange || 0;
    const cls = pct > 0 ? 'pos' : pct < 0 ? 'neg' : 'flat';
    const pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';

    const tr = document.createElement('tr');
    tr.onclick = () => openModal(row, currentTab);
    tr.innerHTML = `
      <td>
        <div class="symbol-cell">
          <div class="symbol-icon">${(row.symbol||'').slice(0,4)}</div>
          <div>
            <div class="symbol-name">${row.symbol || '—'}</div>
            <div class="security-full">${row.securityName || ''}</div>
          </div>
        </div>
      </td>
      <td class="price-cell">${fmt(row.closePrice)}</td>
      <td><span class="change-cell ${cls}">${pctStr}</span></td>
      <td class="vol-cell">${fmtVol(row.totalTradeQuantity)}</td>
      <td class="vol-cell">${fmt(row.previousClose)}</td>
    `;
    body.appendChild(tr);
  });
}

// ============================================================
// MODAL
// ============================================================
function openModal(row, tab) {
  const isToday = tab === 'today';
  const price = row.closePrice || row.lastTradedPrice;
  const prevClose = row.previousDayClosePrice || row.previousClose;
  const pct = isToday
    ? ((price - prevClose) / prevClose * 100)
    : (row.percentageChange || 0);
  const cls = pct > 0 ? 'pos' : pct < 0 ? 'neg' : 'flat';
  const pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(3) + '%';
  const clr = pct > 0 ? 'var(--green)' : pct < 0 ? 'var(--red)' : 'var(--muted)';

  document.getElementById('mSymbol').textContent = row.symbol || '—';
  document.getElementById('mName').textContent = row.securityName || '—';
  document.getElementById('mPrice').textContent = fmt(price);
  const mc = document.getElementById('mChange');
  mc.textContent = pctStr;
  mc.className = 'modal-change ' + cls;
  mc.style.color = clr;
  mc.style.background = clr.replace(')', ',0.12)').replace('var(', 'rgba(').replace(')', '').replace('--green', '0,212,170').replace('--red', '255,71,87').replace('--muted', '90,96,112') + ',0.12)';

  const grid = document.getElementById('mGrid');
  if (isToday) {
    grid.innerHTML = [
      ['Open', fmt(row.openPrice)],
      ['High', fmt(row.highPrice)],
      ['Low', fmt(row.lowPrice)],
      ['Prev Close', fmt(prevClose)],
      ['Volume', fmtVol(row.totalTradedQuantity)],
      ['Total Trades', fmt(row.totalTrades)],
      ['Avg Price', fmt(row.averageTradedPrice)],
      ['Mkt Cap (M)', fmt(row.marketCapitalization)],
    ].map(([l,v]) => `<div class="modal-item"><div class="modal-item-label">${l}</div><div class="modal-item-value">${v}</div></div>`).join('');

    // 52W bar
    if (row.fiftyTwoWeekHigh && row.fiftyTwoWeekLow) {
      const range = row.fiftyTwoWeekHigh - row.fiftyTwoWeekLow;
      const pos = range > 0 ? Math.max(2, Math.min(98, ((price - row.fiftyTwoWeekLow) / range) * 100)) : 50;
      document.getElementById('m52wDot').style.left = pos + '%';
      document.getElementById('m52wLabels').innerHTML = `<span>Low: ${fmt(row.fiftyTwoWeekLow)}</span><span>High: ${fmt(row.fiftyTwoWeekHigh)}</span>`;
      document.getElementById('m52w').style.display = 'block';
    } else {
      document.getElementById('m52w').style.display = 'none';
    }
  } else {
    grid.innerHTML = [
      ['Close Price', fmt(row.closePrice)],
      ['Last Traded', fmt(row.lastTradedPrice)],
      ['Prev Close', fmt(prevClose)],
      ['Volume', fmtVol(row.totalTradeQuantity)],
    ].map(([l,v]) => `<div class="modal-item"><div class="modal-item-label">${l}</div><div class="modal-item-value">${v}</div></div>`).join('');
    document.getElementById('m52w').style.display = 'none';
  }

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ============================================================
// SORTING & FILTERING
// ============================================================
let sortState = { col: null, dir: 1 };

function sortCol(col) {
  const [key, dir] = col.split('_');
  if (sortState.col === key) {
    sortState.dir *= -1;
  } else {
    sortState.col = key;
    sortState.dir = dir === 'desc' ? -1 : 1;
  }
  applyFilterSort();
}

function sortBy(key) {
  // Quick preset sorts
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn_' + key)?.classList.add('active');

  const map = {
    change_desc: { col: 'pct', dir: -1 },
    volume_desc: { col: 'vol', dir: -1 },
    price_desc:  { col: 'price', dir: -1 },
  };
  if (map[key]) {
    sortState = map[key];
    applyFilterSort();
  }
}

function filterTable() {
  applyFilterSort();
  currentPage = 1;
  renderPage();
}

function applyFilterSort() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredData = allData.filter(r => {
    const sym = (r.symbol || '').toLowerCase();
    const name = (r.securityName || '').toLowerCase();
    return !q || sym.includes(q) || name.includes(q);
  });

  // Sort
  if (sortState.col) {
    filteredData.sort((a, b) => {
      let va, vb;
      switch(sortState.col) {
        case 'symbol': va = a.symbol; vb = b.symbol; break;
        case 'pct':
          va = a.percentageChange || ((a.closePrice - a.previousDayClosePrice) / a.previousDayClosePrice * 100);
          vb = b.percentageChange || ((b.closePrice - b.previousDayClosePrice) / b.previousDayClosePrice * 100);
          break;
        case 'vol': va = a.totalTradedQuantity || a.totalTradeQuantity || 0; vb = b.totalTradedQuantity || b.totalTradeQuantity || 0; break;
        case 'price': va = a.closePrice || 0; vb = b.closePrice || 0; break;
        case 'totalTrades': va = a.totalTrades || 0; vb = b.totalTrades || 0; break;
        case 'totalTradeQuantity': va = a.totalTradeQuantity || 0; vb = b.totalTradeQuantity || 0; break;
        default: va = 0; vb = 0;
      }
      if (typeof va === 'string') return va.localeCompare(vb) * sortState.dir;
      return (va - vb) * sortState.dir;
    });
  }

  currentPage = 1;
  renderPage();
}

// ============================================================
// PAGINATION
// ============================================================
function renderPage() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageData = filteredData.slice(start, end);

  if (currentTab === 'today') renderTodayTable(pageData);
  else renderTradeTable(pageData);

  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  document.getElementById('pageInfo').textContent =
    `${start + 1}–${Math.min(end, filteredData.length)} of ${filteredData.length} securities`;

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const container = document.getElementById('pageBtns');
  container.innerHTML = '';

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.innerHTML = '‹';
  prev.disabled = currentPage === 1;
  prev.onclick = () => { currentPage--; renderPage(); };
  container.appendChild(prev);

  const range = pageRange(currentPage, totalPages);
  range.forEach(p => {
    if (p === '...') {
      const sp = document.createElement('button');
      sp.className = 'page-btn';
      sp.textContent = '…';
      sp.disabled = true;
      container.appendChild(sp);
    } else {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
      btn.textContent = p;
      btn.onclick = () => { currentPage = p; renderPage(); };
      container.appendChild(btn);
    }
  });

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.innerHTML = '›';
  next.disabled = currentPage === totalPages;
  next.onclick = () => { currentPage++; renderPage(); };
  container.appendChild(next);
}

function pageRange(cur, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
  if (cur <= 4) return [1,2,3,4,5,'...',total];
  if (cur >= total - 3) return [1,'...',total-4,total-3,total-2,total-1,total];
  return [1,'...',cur-1,cur,cur+1,'...',total];
}

// ============================================================
// TABS
// ============================================================
async function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  document.getElementById('searchInput').value = '';
  sortState = { col: null, dir: 1 };
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));

  showLoading(true);
  try {
    if (tab === 'today') {
      document.getElementById('panelTitle').textContent = "TODAY'S PRICES";
      const data = await fetchTodaysPrice();
      allData = data;
    } else {
      document.getElementById('panelTitle').textContent = 'DAILY TRADE STATS';
      const data = await fetchTradeStats();
      allData = Array.isArray(data) ? data : (data.content || []);
    }
    filteredData = [...allData];
    updateStats();
    renderPage();
  } catch (e) {
    showError(e.message);
  } finally {
    showLoading(false);
  }
}

// ============================================================
// STATS CARDS
// ============================================================
function updateStats() {
  const total = allData.length;
  document.getElementById('totalSecurities').textContent = total;

  let gainers = 0, losers = 0, topVol = null, topVolVal = 0;
  allData.forEach(r => {
    const pct = r.percentageChange || ((r.closePrice - r.previousDayClosePrice) / (r.previousDayClosePrice || 1) * 100);
    if (pct > 0) gainers++;
    else if (pct < 0) losers++;

    const vol = r.totalTradedQuantity || r.totalTradeQuantity || 0;
    if (vol > topVolVal) { topVolVal = vol; topVol = r; }
  });

  document.getElementById('totalGainers').textContent = gainers;
  document.getElementById('gainersRatio').textContent = `vs ${losers} losers`;
  document.getElementById('totalLosers').textContent = losers;
  document.getElementById('topVolSymbol').textContent = topVol ? topVol.symbol : '—';
  document.getElementById('topVolVal').textContent = topVol ? fmtVol(topVolVal) + ' shares' : '—';
}

// ============================================================
// LOADING / ERROR
// ============================================================
function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
}

function showError(msg) {
  document.getElementById('tableBody').innerHTML = `
    <tr><td colspan="9">
      <div class="error-state">
        <div class="err-icon">⚠️</div>
        <h3>Could Not Fetch Data</h3>
        <p>${msg || 'The NEPSE API request failed. This may be due to CORS restrictions when running from a local file.'}</p>
        <div class="hint">Try opening this file through a local server (e.g. VS Code Live Server)</div>
      </div>
    </td></tr>`;
}

// ============================================================
// REFRESH
// ============================================================
async function refreshAll() {
  const btn = document.querySelector('.refresh-btn');
  btn.style.opacity = '0.5';
  btn.style.pointerEvents = 'none';
  await Promise.all([fetchMarketStatus(), reloadTab()]);
  showToast('Data refreshed ✓');
  btn.style.opacity = '';
  btn.style.pointerEvents = '';
}

async function reloadTab() {
  showLoading(true);
  try {
    let data;
    if (currentTab === 'today') {
      data = await fetchTodaysPrice();
    } else {
      data = await fetchTradeStats();
      data = Array.isArray(data) ? data : (data.content || []);
    }
    allData = data;
    filteredData = [...allData];
    updateStats();
    renderPage();
  } catch (e) {
    showError(e.message);
  } finally {
    showLoading(false);
  }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  document.getElementById('loadingOverlay').classList.remove('hidden');
  await fetchMarketStatus();
  try {
    const data = await fetchTodaysPrice();
    allData = data;
    filteredData = [...allData];
    updateStats();
    renderPage();
  } catch (e) {
    showError(e.message);
  } finally {
    showLoading(false);
  }
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
    if (document.activeElement.tagName !== 'INPUT') refreshAll();
  }
});

init();
</script>
